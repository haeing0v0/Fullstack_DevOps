<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>공지사항 수정</title>

<style>
    body{
        font-family: Arial, sans-serif;
    }

    .wrap{
        width: 700px;
        margin: 30px auto;
    }

    h2{
        text-align: center;
    }

    table{
        width: 100%;
        border-collapse: collapse;
    }

    th, td{
        border: 1px solid #ccc;
        padding: 10px;
    }

    th{
        width: 120px;
        background-color: #f2f2f2;
        text-align: center;
    }

    input[type="text"], textarea{
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
    }

    textarea{
        resize: none;
    }

    .btn-area{
        margin-top: 15px;
        text-align: center;
    }

    .btn-area input, .btn-area a{
        display: inline-block;
        padding: 8px 16px;
        margin: 0 5px;
        border: 1px solid #999;
        background-color: #f7f7f7;
        color: black;
        text-decoration: none;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="wrap">
    <h2>공지사항 수정</h2>

    <form th:action="@{/notice/update}" method="post">
        <input type="hidden" name="id" th:value="${notice.id}">

        <table>
            <tr>
                <th>번호</th>
                <td th:text="${notice.id}"></td>
            </tr>
            <tr>
                <th>제목</th>
                <td>
                    <input type="text" name="title" th:value="${notice.title}" required>
                </td>
            </tr>
            <tr>
                <th>작성자</th>
                <td>
                    <input type="text" name="writer" th:value="${notice.writer}" required>
                </td>
            </tr>
            <tr>
                <th>내용</th>
                <td>
                    <textarea name="content" rows="10" required
                              th:text="${notice.content}"></textarea>
                </td>
            </tr>
        </table>

        <div class="btn-area">
            <input type="submit" value="수정완료">
            <a th:href="@{/notice/detail(id=${notice.id})}">취소</a>
            <a th:href="@{/notice/list}">목록</a>
        </div>
    </form>
</div>

</body>
</html>
