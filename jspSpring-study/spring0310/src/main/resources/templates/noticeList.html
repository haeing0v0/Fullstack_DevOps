<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>공지사항 목록</title>

<style>
table{
    border-collapse: collapse;
    width: 900px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

th{
    background:#f2f2f2;
}
</style>

</head>
<body>
<h2>공지사항 목록</h2>
<table>
<thead>
<tr>
<th>번호</th>
<th>제목</th>
<th>내용</th>
<th>작성자</th>
<th>작성일</th>
<th>조회수</th>
</tr>
</thead>

<tbody>

<tr th:each="notice : ${list}">
    <td th:text="${notice.id}"></td>

    <td>
        <a th:href="@{/notice/detail(id=${notice.id})}"
           th:text="${notice.title}">
        </a>
    </td>

    <td th:text="${notice.content}"></td>
    <td th:text="${notice.writer}"></td>
    <td th:text="${notice.regDate}"></td>
    <td th:text="${notice.hit}"></td>
</tr>

</tbody>
</table>

<br>

<a th:href="@{/notice/write}">글 작성</a>

</body>
</html>
