<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>공지사항 작성</title>

<style>
    body{
        font-family: Arial, sans-serif;
    }

    .wrap{
        width: 600px;
        margin: 30px auto;
    }

    h2{
        text-align: center;
    }

    table{
        width: 100%;
        border-collapse: collapse;
    }

    th, td{
        border: 1px solid #ccc;
        padding: 10px;
    }

    th{
        background-color: #f2f2f2;
        width: 120px;
        text-align: center;
    }

    input[type="text"], textarea{
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
    }

    textarea{
        resize: none;
    }

    .btn-area{
        margin-top: 15px;
        text-align: center;
    }

    .btn-area input,
    .btn-area a{
        padding: 8px 16px;
        text-decoration: none;
        border: 1px solid #999;
        background-color: #f7f7f7;
        color: black;
        margin: 0 5px;
        cursor: pointer;
    }
</style>
</head>
<body>
<div class="wrap">
    <h2>공지사항 작성</h2>
    <form th:action="@{/notice/write}" method="post">
        <table>
            <tr>
                <th>제목</th>
                <td>
                    <input type="text" name="title" required>
                </td>
            </tr>
            <tr>
                <th>작성자</th>
                <td>
                    <input type="text" name="writer" value="Admin">
                </td>
            </tr>
            <tr>
                <th>내용</th>
                <td>
                    <textarea name="content" rows="10" required></textarea>
                </td>
            </tr>
        </table>
        <div class="btn-area">
            <input type="submit" value="등록">
            <a th:href="@{/notice/list}">목록</a>
        </div>
    </form>
</div>
</body>
</html>
